name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
    
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Optimize gallery images (PNG/JPG → WebP)
        run: node scripts/optimize-gallery.mjs
    
      - name: Fetch osu! stats
        env:
          OSU_CLIENT_ID: "57170"
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
        run: bash scripts/fetch-osu-stats.sh public/osu-stats.json

      - name: Build site
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name=firefly --branch=master