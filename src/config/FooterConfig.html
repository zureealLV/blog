<script>
// ========== Right Sidebar Injection ==========
(function() {
  var el = document.getElementById("custom-right-widgets");
  if (!el) return;
  var sidebar = document.getElementById("right-sidebar-sticky");
  if (!sidebar) return;
  var children = el.children;
  var delay = 200;
  for (var i = 0; i < children.length; i++) {
    var wrapper = document.createElement("div");
    wrapper.className = "onload-animation";
    wrapper.style.animationDelay = delay + "ms";
    wrapper.appendChild(children[i].cloneNode(true));
    sidebar.appendChild(wrapper);
    delay += 50;
  }
  el.remove();
})();

// ========== Now Playing (Left Sidebar) ==========
(function() {
  var tpl = document.getElementById("now-playing-template");
  if (!tpl) return;
  var sidebar = document.getElementById("left-sidebar-sticky");
  if (!sidebar) return;
  var card = tpl.querySelector(".card-base");
  if (!card) return;
  var wrapper = document.createElement("div");
  wrapper.className = "onload-animation";
  wrapper.style.animationDelay = "300ms";
  wrapper.appendChild(card.cloneNode(true));
  // Insert as an independent sidebar card, right after the music player's wrapper
  var sidebarSticky = document.getElementById("left-sidebar-sticky");
  if (sidebarSticky) {
    // The music widget is nested inside a wrapper div with class onload-animation
    // We need to insert AFTER that wrapper, not inside it
    var musicInner = sidebarSticky.querySelector(".music-player-widget");
    if (musicInner) {
      var musicWrapper = musicInner.closest(".onload-animation") || musicInner.parentElement;
      if (musicWrapper && musicWrapper.parentElement === sidebarSticky) {
        if (musicWrapper.nextSibling) {
          sidebarSticky.insertBefore(wrapper, musicWrapper.nextSibling);
        } else {
          sidebarSticky.appendChild(wrapper);
        }
      } else {
        sidebarSticky.appendChild(wrapper);
      }
    } else {
      sidebarSticky.appendChild(wrapper);
    }
  }
  tpl.remove();

  var pulse = wrapper.querySelector(".np-pulse");
  var disc = wrapper.querySelector(".np-disc");
  var cover = wrapper.querySelector(".np-cover");
  var title = wrapper.querySelector(".np-title");
  var artist = wrapper.querySelector(".np-artist");

  function updateTrack(detail) {
    var track = detail.track;
    if (!track) return;
    if (title) title.textContent = track.name || "--";
    if (artist) artist.textContent = track.artist || "--";
    if (cover && track.pic) {
      cover.src = track.pic;
      cover.style.display = "block";
    }
  }

  function updatePlayState(detail) {
    var playing = detail.isPlaying;
    if (pulse) {
      pulse.classList.toggle("playing", playing);
      pulse.style.opacity = playing ? "1" : "0.4";
    }
    if (disc) disc.classList.toggle("spinning", playing);
  }

  window.addEventListener("fm:track", function(e) { updateTrack(e.detail); });
  window.addEventListener("fm:play-state", function(e) { updatePlayState(e.detail); });

  setTimeout(function() {
    if (window.__fireflyMusic) {
      var st = window.__fireflyMusic.getState();
      if (st && st.track) updateTrack({ track: st.track });
      if (st) updatePlayState({ isPlaying: st.isPlaying });
    }
  }, 2000);

  // ========== Music Visualizer (Simulated + Web Audio fallback) ==========
  var canvas = wrapper.querySelector(".np-bars");
  if (!canvas) return;
  var ctx2d = canvas.getContext("2d");
  if (!ctx2d) return;

  var W = canvas.width;
  var H = canvas.height;
  var BAR_COUNT = 32;
  var barW = (W / BAR_COUNT) * 0.7;
  var gap = (W / BAR_COUNT) * 0.3;
  var isPlaying = false;
  var progress = 0;
  var bars = [];
  var targets = [];
  for (var i = 0; i < BAR_COUNT; i++) { bars[i] = 0; targets[i] = 0; }

  // Pseudo-random from seed
  function seededRandom(seed) {
    var x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
    return x - Math.floor(x);
  }

  function updateTargets() {
    var t = progress * 100;
    for (var i = 0; i < BAR_COUNT; i++) {
      // Multiple sine waves layered for organic look
      var v1 = Math.sin(t * 0.3 + i * 0.5) * 0.3;
      var v2 = Math.sin(t * 0.7 + i * 0.8) * 0.2;
      var v3 = Math.sin(t * 1.1 + i * 1.2) * 0.15;
      var v4 = seededRandom(Math.floor(t * 2) + i * 7) * 0.35;
      var center = BAR_COUNT / 2;
      var dist = Math.abs(i - center) / center;
      var envelope = 1.0 - dist * 0.4;
      targets[i] = Math.max(0.05, Math.min(1, (v1 + v2 + v3 + v4 + 0.5) * envelope));
    }
  }

  // Get theme color as RGB string (handles oklch/hex/hsl via temp element)
  var primaryRGB = (function() {
    var tmp = document.createElement("div");
    tmp.style.color = "var(--primary)";
    tmp.style.position = "absolute";
    tmp.style.visibility = "hidden";
    document.body.appendChild(tmp);
    var computed = getComputedStyle(tmp).color;
    document.body.removeChild(tmp);
    var m = computed.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
    return m ? m[1] + "," + m[2] + "," + m[3] : "0,200,150";
  })();

  function drawBars() {
    requestAnimationFrame(drawBars);

    if (isPlaying) { updateTargets(); }
    else {
      for (var i = 0; i < BAR_COUNT; i++) { targets[i] = targets[i] * 0.95; }
    }

    // Smooth interpolation
    for (var i = 0; i < BAR_COUNT; i++) {
      bars[i] += (targets[i] - bars[i]) * 0.18;
    }

    ctx2d.clearRect(0, 0, W, H);

    for (var i = 0; i < BAR_COUNT; i++) {
      var barHeight = bars[i] * H * 0.9;
      var x = i * (barW + gap);
      var y = H - barHeight;

      var grad = ctx2d.createLinearGradient(x, y, x, H);
      grad.addColorStop(0, "rgba(" + primaryRGB + ",0.9)");
      grad.addColorStop(1, "rgba(" + primaryRGB + ",0.15)");
      ctx2d.fillStyle = grad;

      ctx2d.beginPath();
      ctx2d.roundRect(x, y, barW, barHeight, 2);
      ctx2d.fill();
    }
  }

  // Listen to music events
  window.addEventListener("fm:play-state", function(e) {
    isPlaying = e.detail && e.detail.isPlaying;
  });
  window.addEventListener("fm:time", function(e) {
    if (e.detail) progress = e.detail.progress || 0;
  });

  // Start rendering immediately
  drawBars();

  // Try Web Audio API for real data (bonus, non-blocking)
  function tryRealAudio() {
    var audio = document.querySelector("audio");
    if (!audio) return;
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var src = ctx.createMediaElementSource(audio);
      var analyser = ctx.createAnalyser();
      analyser.fftSize = BAR_COUNT * 2;
      analyser.smoothingTimeConstant = 0.7;
      src.connect(analyser);
      analyser.connect(ctx.destination);
      var realData = new Uint8Array(analyser.frequencyBinCount);
      // Override targets with real frequency data
      updateTargets = function() {
        analyser.getByteFrequencyData(realData);
        for (var i = 0; i < BAR_COUNT; i++) {
          targets[i] = realData[i] / 255;
        }
      };
    } catch (e) { /* CORS blocked, keep simulated */ }
  }
  document.addEventListener("click", function onCl() {
    tryRealAudio();
    document.removeEventListener("click", onCl);
  });
})();

// ========== osu! Stats ==========
fetch("/osu-stats.json")
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var pp = document.querySelector(".osu-pp");
    var rank = document.querySelector(".osu-rank");
    var acc = document.querySelector(".osu-acc");
    var pc = document.querySelector(".osu-pc");
    if (pp) pp.textContent = d.pp.toLocaleString();
    if (rank) rank.textContent = "#" + d.global_rank.toLocaleString();
    if (acc) acc.textContent = d.accuracy + "%";
    if (pc) pc.textContent = d.play_count.toLocaleString();
    var level = document.querySelector(".osu-level");
    var combo = document.querySelector(".osu-combo");
    var ss = document.querySelector(".osu-ss");
    var s = document.querySelector(".osu-s");
    var a = document.querySelector(".osu-a");
    if (level) level.textContent = d.level || "--";
    if (combo) combo.textContent = (d.max_combo || 0).toLocaleString();
    if (ss) ss.textContent = (d.grade_ss || 0);
    if (s) s.textContent = (d.grade_s || 0);
    if (a) a.textContent = (d.grade_a || 0);
  })
  .catch(function() {});


// ========== ASCII Art (Left Sidebar) ==========
(function() {
  var arts = [
    // osu! circle
    "  ___  \n / _ \ \n| (_) |\n \___/ \n",

    "+-----------------+\n| q w e r t y u i |\n| a s d f g h j k |\n+-----------------+\n",

  wrapper.appendChild(clone);

// ========== Birthday Effects ==========
(function() {
  var now = new Date();
  var isPreview = location.search.indexOf("birthday=1") >= 0;
  if (!isPreview && (now.getMonth() !== 4 || now.getDate() !== 26)) return;

  var cs = document.createElement("script");
  cs.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1";
  cs.onload = function() {
    var end = Date.now() + 5000;
    (function frame() {
      confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ["#ff6b9d","#ffd700","#7cfc00","#87ceeb"] });
      confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ["#ff6b9d","#ffd700","#7cfc00","#87ceeb"] });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
    setTimeout(function() { confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ["#ff6b9d","#ffd700","#ff69b4","#ff1493"] }); }, 1000);
  };
  document.head.appendChild(cs);

  function patchAnnouncement() {
    var all = document.querySelectorAll('.card-base p, .card-base div, [class*="announce"] *, .widget-hide-on-non-post p, .widget-hide-on-non-post div');
    for (var i = 0; i < all.length; i++) {
      var t = all[i];
      if (t.textContent === "Me and Hermes" || t.textContent.indexOf("Me and Hermes") >= 0) {
        t.textContent = "\ud83c\udf82 Happy Birthday Lv\ufe01\ud83c\udf82";
        t.style.color = "#ff6b9d";
      }
      if (t.textContent.indexOf("\u6211\u662f Hermes") >= 0 && t.textContent.indexOf("\u8d5b\u535a\u5c0f\u52a9\u624b") >= 0) {
        t.innerHTML = "\ud83c\udf89 \u4eca\u5929\u522b\u6253 osu! \u4e86\uff01\u5feb\u53bb\u8fc7\u751f\u65e5\u5403\u86cb\u7cd5\uff5e<br>Lv \u751f\u65e5\u5feb\u4e50\uff01\uff01(\u2267\u25e0\u2266)\ud83c\udf82\ud83d\udc96";
        t.style.color = "#ff6b9d";
      }
    }
  }
  patchAnnouncement();
  var retries = 0;
  var retryTimer = setInterval(function() {
    patchAnnouncement();
    if (++retries > 10) clearInterval(retryTimer);
  }, 300);

  function patchBanner() {
    var h1s = document.querySelectorAll("h1");
    for (var i = 0; i < h1s.length; i++) {
      var h = h1s[i];
      if (h.textContent.indexOf("OSU") >= 0 && h.textContent.indexOf("TV") >= 0) {
        h.textContent = "\ud83c\udf82 Happy Birthday Lv\ufe01\ud83c\udf82";
        h.style.color = "#ff6b9d";
      }
    }
    var bannerEl = document.querySelector('.banner-title, [class*="banner-title"]');
    if (bannerEl) {
      bannerEl.textContent = "\ud83c\udf82 Happy Birthday Lv\ufe01\ud83c\udf82";
      bannerEl.style.color = "#ff6b9d";
    }
  }
  setTimeout(patchBanner, 600);
  setTimeout(patchBanner, 1500);

  function makeCakeRain() {
    var canvases = document.querySelectorAll("canvas");
    for (var i = 0; i < canvases.length; i++) {
      if (canvases[i].width > 100 && canvases[i].height > 100) {
        var cakeDiv = document.createElement("div");
        cakeDiv.id = "cake-rain";
        cakeDiv.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;";
        document.body.appendChild(cakeDiv);
        setInterval(function() {
          var cake = document.createElement("span");
          cake.textContent = "\ud83c\udf82";
          cake.style.cssText = "position:absolute;font-size:" + (16 + Math.random() * 20) + "px;left:" + Math.random() * 100 + "%;top:-30px;animation:cakeFall " + (3 + Math.random() * 4) + "s linear forwards;opacity:" + (0.6 + Math.random() * 0.4) + ";";
          cakeDiv.appendChild(cake);
          setTimeout(function() { cake.remove(); }, 8000);
        }, 300);
        var styleSheet = document.createElement("style");
        styleSheet.textContent = "@keyframes cakeFall{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(100vh) rotate(720deg)}}";
        document.head.appendChild(styleSheet);
        break;
      }
    }
  }
  setTimeout(makeCakeRain, 1000);

  function addHat() {
    var imgs = document.querySelectorAll('img[alt*="Profile"], img[alt*="Author"], img[alt*="avatar"], [class*="avatar"] img, .profile-avatar img');
    for (var i = 0; i < imgs.length; i++) {
      var img = imgs[i];
      if (img.src && img.src.indexOf("avatar") >= 0 && !img.parentElement.querySelector(".cake-hat")) {
        var parent = img.parentElement;
        var computed = window.getComputedStyle(parent);
        if (computed.position === "static") parent.style.position = "relative";
        if (computed.overflow === "hidden") parent.style.overflow = "visible";
        var hat = document.createElement("span");
        hat.className = "cake-hat";
        hat.textContent = "\ud83c\udf82";
        hat.style.cssText = "position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:20px;z-index:20;pointer-events:none;animation:cakeBounce 0.5s infinite alternate;";
        parent.appendChild(hat);
      }
    }
  }
  setTimeout(addHat, 800);
  setTimeout(addHat, 2000);

  var bounceKeyframes = document.createElement("style");
  bounceKeyframes.textContent = "@keyframes cakeBounce{from{transform:translateX(-50%) translateY(-2px)}to{transform:translateX(-50%) translateY(2px)}}";
  document.head.appendChild(bounceKeyframes);
})();

// ========== 404 Terminal (global, survives Swup navigation) ==========
(function() {
  function init404Terminal() {
    var output = document.getElementById("terminal-output");
    var inputLine = document.getElementById("input-line");
    var input = document.getElementById("terminal-input");
    var body = document.getElementById("terminal-body");
    if (!output || !input || !inputLine) return;
    if (output.dataset.init === "done") return;
    output.dataset.init = "done";

    output.innerHTML = "";
    inputLine.style.display = "none";
    input.value = "";

    var introLines = [
      { text: "Last login: " + new Date().toLocaleString() + " on ttys000", cls: "cmd-dim", delay: 100 },
      { text: "", delay: 50 },
      { text: "zureeal@osu-tv ~ $ curl -s https://zureeallv.com" + location.pathname, cls: "cmd-input", delay: 600 },
      { text: "", delay: 200 },
      { text: "> Connecting to zureeallv.com...", cls: "cmd-dim", delay: 400 },
      { text: "> HTTP/1.1 404 Not Found", cls: "cmd-error", delay: 300 },
      { text: "> Content-Type: text/html; charset=utf-8", cls: "cmd-dim", delay: 200 },
      { text: "> X-Powered-By: Astro + Firefly", cls: "cmd-dim", delay: 150 },
      { text: "", delay: 100 },
      { text: "ERROR: Page not found in this universe.", cls: "cmd-error", delay: 400 },
      { text: "", delay: 100 },
      { text: "Possible causes:", cls: "cmd-warning", delay: 300 },
      { text: "  - The page was eaten by a osu! slider", cls: "cmd-output", delay: 200 },
      { text: "  - It eloped with a 403 Forbidden", cls: "cmd-output", delay: 200 },
      { text: "  - Hermes accidentally deleted it (blame the AI)", cls: "cmd-output", delay: 200 },

    var defaultResponses = [
      [{ text: "404: Command not found. Just like this page.", cls: "cmd-error" }],

      [{ text: "你在虚空里打字，没人会回应你。就像你给 crush 发的消息。", cls: "cmd-warning" }],
    ];

    var lineIndex = 0;
    var defaultIndex = 0;

    function addLine(cls, text) {
      var div = document.createElement("div");
      div.className = "cmd-line";
      var span = document.createElement("span");
      span.className = cls || "cmd-output";
      span.textContent = text;
      div.appendChild(span);
      output.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function addPromptLine(cmd) {
      var div = document.createElement("div");
      div.className = "cmd-line";
      var escaped = cmd.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      div.innerHTML = '<span class="prompt-user">zureeal</span><span class="prompt-at">@</span><span class="prompt-host">osu-tv</span><span class="prompt-path"> ~ $ </span><span class="cmd-input">' + escaped + '</span>';
      output.appendChild(div);
    }

    function processIntro() {
      if (lineIndex >= introLines.length) {
        inputLine.style.display = "flex";
        input.focus();
        body.scrollTop = body.scrollHeight;
        return;
      }
      var line = introLines[lineIndex];
      lineIndex++;
      addLine(line.cls, line.text);
      setTimeout(processIntro, line.delay || 100);
    }

    function handleCommand(cmd) {
      cmd = cmd.trim().toLowerCase();
      if (!cmd) return;
      addPromptLine(cmd);
      if (cmd === "clear") { output.innerHTML = ""; return; }
      if (cmd === "home" || cmd === "cd /" || cmd === "cd ~") {
        addLine("cmd-success", "Redirecting to homepage...");
        setTimeout(function() { window.location.href = "/"; }, 800);
        return;
      }
      var resp = responses[cmd];
      if (resp === "redirect") {
        addLine("cmd-success", "Redirecting to homepage...");
        setTimeout(function() { window.location.href = "/"; }, 800);
        return;
      }
      if (resp && resp.length) {
        for (var i = 0; i < resp.length; i++) { addLine(resp[i].cls, resp[i].text); }
      } else {
        var chosen = defaultResponses[defaultIndex % defaultResponses.length];
        defaultIndex++;
        for (var j = 0; j < chosen.length; j++) {
          addLine(chosen[j].cls, chosen[j].text.replace(/\$CMD\$/g, cmd));
        }
      }
      addLine("", "");
      body.scrollTop = body.scrollHeight;
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") { var cmd = input.value; input.value = ""; handleCommand(cmd); }
    });
    body.addEventListener("click", function() { input.focus(); });
    setTimeout(processIntro, 500);
  }

  // ========== About Page osu! Stats Loader (survives Swup navigation) ==========
  function loadOsuStats() {
    // Only run on about page
    var statEl = document.getElementById('stat-pp');
    if (!statEl) return;
    if (statEl.dataset.loaded === 'done') return;
    statEl.dataset.loaded = 'done';
    fetch('/osu-stats.json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var set = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
        set('stat-pp', d.pp.toLocaleString());
        set('stat-rank', '#' + d.global_rank.toLocaleString());
        set('stat-acc', d.accuracy + '%');
        set('stat-pc', d.play_count.toLocaleString());
        set('stat-level', d.level);
        set('stat-combo', d.max_combo.toLocaleString());
        set('stat-grades', (d.grade_ss||0) + ' / ' + (d.grade_s||0) + ' / ' + (d.grade_a||0));
        set('stat-score', (d.ranked_score / 1e9).toFixed(1) + 'B');
      })
      .catch(function() {});
  }

  // Global listener — fires on every Swup navigation (persists across pages)
  // @swup/astro dispatches 'astro:page-load' on page:view hook
  document.addEventListener("astro:page-load", function() {
    setTimeout(init404Terminal, 100);
    setTimeout(loadOsuStats, 200);
  });

  // Also listen to swup events directly as fallback
  document.addEventListener("swup:contentReplaced", function() {
    setTimeout(init404Terminal, 100);
    setTimeout(loadOsuStats, 200);
  });

  // Direct load (no Swup)
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function() { init404Terminal(); loadOsuStats(); });
  } else {
    init404Terminal();
    loadOsuStats();
  }
})();
</script>
